<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .chat-container {
            width: 100%;
            max-width: 720px;
            background: #111;
            border: 1px solid #33ff33;
            border-radius: 8px;
            padding: 1rem;
        }

        .header {
            font-size: 0.9rem;
            color: #33ff33;
            border-bottom: 1px solid #33ff33;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .header span:last-child {
            opacity: 0.6;
            font-size: 0.7rem;
        }

        .messages {
            height: 360px;
            overflow-y: auto;
            padding: 0.2rem 0;
            margin-bottom: 1rem;
            border: none;
            background: transparent;
            scrollbar-width: thin;
            scrollbar-color: #33ff33 #111;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #33ff33;
        }
        .messages::-webkit-scrollbar-track {
            background: #111;
        }

        .message {
            padding: 0.2rem 0.3rem;
            margin-bottom: 0.2rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .message.user::before {
            content: "> ";
            color: #88ff88;
        }

        .message.bot::before {
            content: "◆ ";
            color: #33ff33;
        }

        .message.error {
            color: #ff4444;
        }
        .message.error::before {
            content: "✗ ";
            color: #ff4444;
        }

        .typing-indicator {
            display: none;
            padding: 0.2rem 0.3rem;
            color: #558855;
            font-size: 0.85rem;
            font-style: italic;
        }
        .typing-indicator.active {
            display: block;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid #33ff33;
            padding-top: 0.8rem;
        }

        .input-row input {
            flex: 1;
            padding: 0.4rem 0.6rem;
            background: #111;
            border: 1px solid #33ff33;
            border-radius: 0;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .input-row input:focus {
            background: #1a1a1a;
            border-color: #88ff88;
        }

        .input-row input::placeholder {
            color: #446644;
        }

        .input-row button {
            padding: 0.4rem 1.2rem;
            background: #111;
            border: 1px solid #33ff33;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.1s;
        }

        .input-row button:hover {
            background: #1a1a1a;
            border-color: #88ff88;
        }

        .input-row button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 0.6rem;
            font-size: 0.6rem;
            color: #446644;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            padding-top: 0.6rem;
        }

        .footer .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #33ff33;
            margin-right: 4px;
        }
        .footer .dot.offline {
            background: #ff4444;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <span>✦ chat</span>
        <span id="status">●</span>
    </div>

    <div class="messages" id="messages">
        <div class="message bot">Hello.</div>
    </div>

    <div class="typing-indicator" id="typing">…</div>

    <div class="input-row">
        <input type="text" id="question" placeholder="type…" autofocus />
        <button id="sendBtn">send</button>
    </div>

    <div class="footer">
        <span class="dot" id="statusDot"></span> <span id="version">v0.1</span>
    </div>
</div>

<script>
    let API_URL = null;

    fetch('config.json')
        .then(res => {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(config => {
            if (!config.apiUrl) throw new Error('Missing apiUrl');
            API_URL = config.apiUrl;
            document.getElementById('question').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('question').placeholder = 'type…';
            document.getElementById('status').textContent = '●';
            document.getElementById('statusDot').classList.remove('offline');
        })
        .catch(err => {
            console.error('Config error:', err);
            document.getElementById('status').textContent = '✗';
            document.getElementById('statusDot').classList.add('offline');
            const msg = document.createElement('div');
            msg.className = 'message error';
            msg.textContent = 'config.json not found.';
            document.getElementById('messages').appendChild(msg);
        });

    const messagesEl = document.getElementById('messages');
    const typingEl = document.getElementById('typing');
    const inputEl = document.getElementById('question');
    const sendBtn = document.getElementById('sendBtn');

    inputEl.disabled = true;
    sendBtn.disabled = true;

    function addMessage(text, type = 'bot') {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
    }

    function setTyping(visible) {
        typingEl.classList.toggle('active', visible);
    }

    function setLoading(loading) {
        sendBtn.disabled = loading || !API_URL;
        inputEl.disabled = loading || !API_URL;
        sendBtn.textContent = loading ? '…' : 'send';
    }

    async function sendQuestion(question) {
        if (!question.trim() || !API_URL) return;

        addMessage(question, 'user');
        inputEl.value = '';

        setTyping(true);
        setLoading(true);

        const botMsg = addMessage('', 'bot');
        let fullAnswer = '';

        try {
            const response = await fetch(`${API_URL}/ask`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question }),
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(`Server error: ${response.status} ${err}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                while (buffer.includes('\n')) {
                    const idx = buffer.indexOf('\n');
                    let line = buffer.slice(0, idx).trim();
                    buffer = buffer.slice(idx + 1);

                    if (!line || !line.startsWith('data: ')) continue;

                    const jsonStr = line.slice(6);
                    try {
                        const data = JSON.parse(jsonStr);
                        if (data.token !== undefined && !data.done) {
                            fullAnswer += data.token || '';
                            botMsg.textContent = fullAnswer;
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                        }
                    } catch (_) {}
                }
            }

            if (!fullAnswer) botMsg.textContent = '(no response)';

        } catch (err) {
            console.error(err);
            botMsg.textContent = 'Error: ' + (err.message || 'Something went wrong.');
            botMsg.className = 'message error';
        } finally {
            setTyping(false);
            setLoading(false);
            inputEl.focus();
        }
    }

    sendBtn.addEventListener('click', () => { if (API_URL) sendQuestion(inputEl.value); });
    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (API_URL) sendQuestion(inputEl.value);
        }
    });
</script>

</body>
</html>
